name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile project
        run: ./mvnw -B clean compile

      - name: Package project
        run: ./mvnw -B package -DskipTests

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packaged-jars
          path: |
            **/target/*.jar
          if-no-files-found: warn

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
          if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Generate JaCoCo report
        run: ./mvnw -B verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            **/target/site/jacoco/*
            **/target/jacoco.exec
          if-no-files-found: warn

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: dockerfile
        shell: bash
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image
        if: steps.dockerfile.outputs.present == 'true'
        run: docker build -t jsonschema2pojo-app .

      - name: Dockerfile missing
        if: steps.dockerfile.outputs.present != 'true'
        run: echo "Dockerfile not found. Add deployment files to enable this stage."
